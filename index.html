<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xye Printing Services</title>

<!-- Fonts similar to your logo -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* HEADER CONTAINER */
    .header {
        display: flex;
        align-items: center;
        padding: 10px 20px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* LOGO SIZE (AT LEAST 2in x 2in) */
    .logo img {
        width: 2in;
        height: 2in;
        object-fit: contain;
    }

    /* TEXT STYLE */
    .brand-text {
        display: flex;
        flex-direction: column;
        margin-left: 15px;
        line-height: 1.1;
    }

    .brand-name {
        font-family: 'Pacifico', cursive; /* script style like your logo */
        font-size: 36px;
        color: #000;
    }

    .brand-sub {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        letter-spacing: 3px;
        font-weight: 700;
        color: #000;
        text-transform: uppercase;
    }
</style>
</head>


<footer>
  © 2026 My Printing Services
</footer>

</body>
</html>
