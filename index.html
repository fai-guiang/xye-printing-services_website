<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xye Printing Services</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* HERO / COVER PHOTO SECTION */
    .hero {
        position: relative;
        width: 100%;
        height: 70vh; /* height of cover photo */
        background-image: url("Cover photo.jpg"); /* 🔴 YOUR COVER PHOTO HERE */
        background-size: cover;
        background-position: center;
    }

    /* TOP LEFT LOGO */
    .logo {
        position: absolute;
        top: 20px;
        left: 20px;
    }

    .logo img {
        width: 120px;  /* adjust size */
        height: auto;
    }

    /* OPTIONAL TEXT OVER COVER */
    .hero-text {
        position: absolute;
        bottom: 30px;
        left: 20px;
        color: white;
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
</style>
</head>

<body>

<!-- COVER PHOTO SECTION -->
<div class="hero">

    <!-- LOGO TOP LEFT -->
    <div class="logo">
        <img src="xye printing logo.jpg" alt="Logo">
    </div>

    <!-- OPTIONAL TEXT -->
    <div class="hero-text">
        Xye Printing Services
    </div>

</div>

<!-- PAGE CONTENT -->
<div style="padding: 20px;">
    <h2>Welcome to our shop</h2>
    <p>Your content goes here...</p>
</div>

</body>
</html>
