<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xye Printing Services</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* COVER PHOTO SECTION */
    .hero {
        position: relative;
        width: 100%;
        height: 100vh; /* full screen height */
        background-image: url("Cover photo.jpg"); /* your cover photo */
        background-size: cover;        /* keeps aspect ratio */
        background-position: center;   /* centers image */
        background-repeat: no-repeat;
    }

    /* LOGO TOP LEFT */
    .logo {
        position: absolute;
        top: 20px;
        left: 20px;
    }

    .logo img {
        width: 120px;
        height: auto;
    }

    /* OPTIONAL TEXT */
    .hero-text {
        position: absolute;
        bottom: 40px;
        left: 20px;
        color: white;
        font-size: 32px;
        font-weight: bold;
        text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
</style>
</head>

<body>

<!-- COVER SECTION -->
<div class="hero">

    <!-- LOGO -->
    <div class="logo">
        <img src="xye printing logo.jpg" alt="Logo">
    </div>

    <!-- TEXT -->
    <div class="hero-text">
        Xye Printing Services
    </div>

</div>

</body>
</html>
