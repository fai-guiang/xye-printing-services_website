<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xye Printing Services</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 40px;
    height: 40px;
    object-fit: contain;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    margin-top: 70px;
}

/* LEFT SIDEBAR */
.sidebar-left {
    width: 20%;
    padding: 15px;
    position: sticky;
    top: 70px;
    height: fit-content;
}

/* CENTER FEED */
.feed {
    width: 60%;
    padding: 15px;
}

/* RIGHT SIDEBAR */
.sidebar-right {
    width: 20%;
    padding: 15px;
    position: sticky;
    top: 70px;
    height: fit-content;
}

/* CARD STYLE (like posts) */
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .sidebar-left, .sidebar-right {
        display: none;
    }
    .feed {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">
        <img src="xye printing logo.jpg" alt="Logo">
        <strong>Xye Printing Services</strong>
    </div>
    <div>Search / Menu</div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar-left">
        <div class="card">Home</div>
        <div class="card">Orders</div>
        <div class="card">Services</div>
        <div class="card">Contact</div>
    </div>

    <!-- FEED -->
    <div class="feed">

        <div class="card">
            <h3>Welcome Post</h3>
            <p>This is your main feed area (like Facebook posts).</p>
        </div>

        <div class="card">
            <h3>Printing Promo</h3>
            <p>Upload your designs here or announcements.</p>
        </div>

    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar-right">
        <div class="card">Ads / Promo</div>
        <div class="card">Updates</div>
    </div>

</div>

</body>
</html>
