<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xye Printing Services</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 40px;
    height: 40px;
    object-fit: contain;
}

/* COVER PHOTO */
.cover {
    margin-top: 60px; /* pushes below topbar */
    width: 100%;
    height: 300px;
    background-image: url("Cover photo.jpg"); /* YOUR COVER PHOTO */
    background-size: cover;       /* no stretching */
    background-position: center;  /* keeps center focus */
    background-repeat: no-repeat;
    position: relative;
}

/* LOGO ON COVER (like Facebook profile pic style) */
.cover-logo {
    position: absolute;
    bottom: -40px;
    left: 30px;
    background: white;
    padding: 5px;
    border-radius: 10px;
}

.cover-logo img {
    width: 100px;
    height: 100px;
    object-fit: contain;
}

/* MAIN LAYOUT */
.container {
    display: flex;
    margin-top: 60px;
}

/* SIDEBARS + FEED */
.sidebar-left {
    width: 20%;
    padding: 15px;
}

.feed {
    width: 60%;
    padding: 15px;
}

.sidebar-right {
    width: 20%;
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .sidebar-left, .sidebar-right {
        display: none;
    }
    .feed {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">
        <img src="xye printing logo.jpg" alt="Logo">
        <strong>XYE PRITING SERVICES</strong>
    </div>
    <div>Menu</div>
</div>

<!-- COVER PHOTO -->
<div class="cover">

    <!-- LOGO ON COVER -->
    <div class="cover-logo">
        <img src="Cover photo.jpg" alt="Logo">
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- LEFT -->
    <div class="sidebar-left">
        <div class="card">Home</div>
        <div class="card">Orders</div>
        <div class="card">Services</div>
    </div>

    <!-- FEED -->
    <div class="feed">
        <div class="card">
            <h3>Welcome to Xye Printing Services</h3>
            <p>Your posts and updates go here.</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="sidebar-right">
        <div class="card">Promo</div>
        <div class="card">Announcements</div>
    </div>

</div>

</body>
</html>
